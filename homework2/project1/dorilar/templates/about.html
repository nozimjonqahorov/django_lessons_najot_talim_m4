<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Biz haqimizda</title>
    <style>
        /* Asosiy sozlamalar */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        /* Glassmorphism konteyner */
        .about-card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 50px;
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 2.2rem;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1.3;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            margin-bottom: 30px;
        }

        /* Tugma stili */
        .btn-home {
            display: inline-block;
            text-decoration: none;
            color: white;
            background: #2c3e50; /* Jiddiyroq quyuq rang */
            padding: 12px 30px;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .btn-home:hover {
            transform: scale(1.05);
            background: #1a252f;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        /* Bezak uchun kichik element */
        .accent-line {
            width: 60px;
            height: 4px;
            background: #ff7e5f;
            margin: 0 auto 25px;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="about-card">
        <div class="accent-line"></div>
        <h1>Biz haqimizda bilib oling</h1>
        <p>
            Bizning loyihamiz dori-darmonlarni qidirish va ularni tartibga solishni osonlashtirish uchun yaratilgan. 
            Biz har bir mijozga sifatli va ishonchli xizmat ko'rsatishga intilamiz.
        </p>
        <a href="{% url 'home' %}" class="btn-home">Bosh sahifaga qaytish</a>
    </div>
</body>
</html>
