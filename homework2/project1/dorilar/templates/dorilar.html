    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dorilar katalogi</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: 'Poppins', sans-serif;
                background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
                min-height: 100vh;
                padding: 40px 20px;
                color: #2c3e50;
            }

            .container {
                max-width: 1000px;
                margin: 0 auto;
            }

            /* Yuqori qism */
            .header {
                text-align: center;
                margin-bottom: 50px;
                background: rgba(255, 255, 255, 0.2);
                padding: 30px;
                border-radius: 20px;
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.3);
            }

            h1 {
                font-size: 2.5rem;
                margin-bottom: 15px;
            }

            .back-link {
                text-decoration: none;
                color: #007bff;
                font-weight: 500;
                transition: 0.3s;
            }

            .back-link:hover {
                text-decoration: underline;
            }

            /* Kartochkalar to'plami */
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 25px;
            }

            /* Alohida dori kartochkasi */
            .card {
                background: rgba(255, 255, 255, 0.7);
                backdrop-filter: blur(10px);
                border-radius: 15px;
                padding: 25px;
                border: 1px solid rgba(255, 255, 255, 0.5);
                transition: all 0.3s ease;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }

            .card:hover {
                transform: translateY(-10px);
                background: rgba(255, 255, 255, 0.9);
                box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
            }

            .card h3 {
                color: #1a1a1a;
                font-size: 1.4rem;
            }

            .brand {
                display: inline-block;
                background: #e1f5fe;
                color: #0288d1;
                padding: 4px 12px;
                border-radius: 20px;
                font-size: 0.85rem;
                font-weight: 600;
                width: fit-content;
            }

            .price {
                font-size: 1.2rem;
                font-weight: 700;
                color: #27ae60;
                margin-top: 10px;
            }

            .price::after {
                content: " so'm";
                font-size: 0.9rem;
                font-weight: 400;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>Barcha dorilar</h1>
                <a href="{% url 'home' %}" class="back-link">← Bosh sahifaga qaytish</a>
            </div>

            <div class="grid">
                {% for dori in dorilar %}
                <div class="card">
                    <span class="brand">{{ dori.brand }}</span>
                    <h3>{{ dori.title }}</h3>
                    <p class="price">{{ dori.price }}</p>
                </div>
                {% empty %}
                <p style="text-align: center; grid-column: 1/-1;">Hozircha dorilar mavjud emas.</p>
                {% endfor %}
            </div>
        </div>
    </body>
    </html>
