<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aloqa | ElectroMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0f172a;
            color: white;
            min-height: 100vh;
        }
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        input, textarea {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: white !important;
        }
        input:focus, textarea:focus {
            border-color: #3b82f6 !important;
            outline: none;
        }
    </style>
</head>
<body>

    <nav class="p-6 flex justify-between items-center max-w-6xl mx-auto">
        <div class="text-2xl font-bold tracking-tighter text-blue-400">ELECTRO.UZ</div>
        <div class="space-x-8 text-sm font-medium uppercase tracking-widest">
            <a href="{% url 'home' %}" class="hover:text-blue-400 transition">Asosiy</a>
            <a href="{% url 'about' %}" class="hover:text-blue-400 transition">Biz haqimizda</a>
            <a href="{% url 'contact' %}" class="text-blue-400">Aloqa</a>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto mt-16 px-6">
        <div class="text-center mb-12">
            <h1 class="text-5xl font-extrabold mb-4">Biz bilan bog'laning</h1>
            <p class="text-gray-400">Savollaringiz bormi? Bizga xabar qoldiring.</p>
        </div>

        <div class="grid md:grid-cols-3 gap-8">
            <div class="space-y-4">
                <div class="glass p-6 rounded-2xl">
                    <div class="text-blue-400 text-2xl mb-2">📍 Manzil</div>
                    <p class="text-sm text-gray-300">Toshkent sh., Chilonzor tumani, Najot Ta'lim binosi</p>
                </div>
                <div class="glass p-6 rounded-2xl">
                    <div class="text-emerald-400 text-2xl mb-2">📞 Telefon</div>
                    <p class="text-sm text-gray-300">+998 90 123 45 67</p>
                </div>
                <div class="glass p-6 rounded-2xl">
                    <div class="text-purple-400 text-2xl mb-2">📧 Email</div>
                    <p class="text-sm text-gray-300">info@electro.uz</p>
                </div>
            </div>

            <div class="md:col-span-2">
                <form class="glass p-10 rounded-3xl space-y-6">
                    <div class="grid md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">Ismingiz</label>
                            <input type="text" class="w-full p-4 rounded-xl" placeholder="Ali Valiyev">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-400 mb-2">Email</label>
                            <input type="email" class="w-full p-4 rounded-xl" placeholder="example@mail.com">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-400 mb-2">Xabar matni</label>
                        <textarea rows="5" class="w-full p-4 rounded-xl" placeholder="Sizning xabaringiz..."></textarea>
                    </div>
                    <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-4 rounded-xl font-bold transition-all">
                        Xabar yuborish
                    </button>
                </form>
            </div>
        </div>
    </main>

    <footer class="mt-20 py-10 text-center text-gray-500 text-sm">
        &copy; 2026 Nozimjon Qahorov.
    </footer>

</body>
</html>
