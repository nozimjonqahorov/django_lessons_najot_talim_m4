
{% if news %}
    <h2>{{ news.title }}</h2>
    <p>Muallif: {{ news.author }}</p>
    <p>Davlati: {{ news.country }}</p>
    <p>Matni: {{ news.desc }}</p>
  
    <a href="{% url 'list' %}"> Barcha yangiliklar</a>
    <a href="{% url 'delete' news.id %}"> Uchirish</a>
    <a href="{% url 'update' news.id %}"> Uzgartirish</a>
{% else %}
    <p>Kitob topilmadi</p>
{% endif %}
