<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noutbuklar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #2c3e50;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            background: rgba(255, 255, 255, 0.2);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .back-link {
            text-decoration: none;
            color: #34495e;
            font-weight: 600;
            transition: 0.3s;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        .prof-tag {
            background: #2c3e50;
            color: white;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.8rem;
            width: fit-content;
            margin-bottom: 5px;
        }

        .card h3 {
            font-size: 1.5rem;
            color: #1a1a1a;
        }

        .info-row {
            font-size: 0.95rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 4px 0;
        }

        .label {
            font-weight: 600;
            color: #7f8c8d;
        }

        .salary {
            font-size: 1.3rem;
            font-weight: 700;
            color: #27ae60;
            margin-top: 15px;
            text-align: center;
            background: rgba(39, 174, 96, 0.1);
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            
            <h1>Bizning notebooklar</h1>
            <a href="{% url 'home' %}" class="back-link">← Orqaga qaytish</a></br>
            <a href="{% url 'add' %}" class="back-link">← Notebook qushish</a></br>

        </div>
        
        


        <div class="grid">
            {% for n in notebooks %}
            <div class="card">
                
                 <a  href="{% url 'detail' n.id %}">{{n.brand}}</a><br><br>
                
                
                <div class="info-row">
                    <span class="label">Processor:</span>
                    <span>{{ n.processor }}</span>
                </div>
                
                <div class="info-row">
                    <span class="label">Xotirasi:</span>
                    <span>{{ n.ram }} </span>
                </div>

                <div class="info-row">
                    <span class="label">Narxi:</span>
                    <span>{{ n.price }}$ </span>
                </div>
             
            </div>
            {% empty %}
            <p style="text-align: center; grid-column: 1/-1;">Hozircha notebooklar ro'yxati bo'sh.</p>
            {% endfor %}
        </div>
    </div>
</body>
</html>
